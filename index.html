<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自制AI小工具导航页</title>
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        /* 页面主体样式 */
        body {
            background-color: #f5f5f5;
            padding: 20px;
        }

        /* 标题样式 */
        .page-title {
            text-align: center;
            margin-bottom: 30px;
            color: #333;
            font-size: 28px;
        }

        /* 盒子容器 - 网格布局 */
        .box-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 单个盒子样式 */
        .nav-box {
            background-color: white;
            border-radius: 10px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            font-size: 20px;
            font-weight: 600;
            color: #333;
        }

        /* 鼠标悬停效果 */
        .nav-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 12px rgba(0, 0, 0, 0.15);
            background-color: #f0f8ff;
        }

        /* 响应式适配 - 小屏幕调整 */
        @media (max-width: 768px) {
            .box-container {
                grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            }

            .nav-box {
                padding: 30px 15px;
                font-size: 18px;
            }
        }
    </style>
    <!-- 引入jQuery CDN -->
    <script src="script/jquery-4.0.0.min.js"></script>
</head>

<body>
    <h1 class="page-title">自制AI小工具导航页</h1>
    <div class="box-container" id="boxContainer"></div>

    <script>
        // 等待DOM加载完成（jQuery的ready方法）
        $(document).ready(function () {
            // 盒子配置的JSON数据
            const boxConfig = [
                {
                    "name": "代肝排队工具",
                    "url": "page/queue.html"
                },
            ];

            // 获取盒子容器（jQuery方式）
            const $boxContainer = $('#boxContainer');

            // 渲染盒子到页面
            function renderBoxes() {
                // 清空容器（jQuery方式）
                $boxContainer.empty();

                // 遍历JSON配置，创建每个盒子
                $.each(boxConfig, function (index, box) {
                    // 创建盒子元素（jQuery方式）
                    const $boxElement = $('<div>')
                        .addClass('nav-box')  // 添加类名
                        .text(box.name);      // 设置显示文本

                    // 添加点击事件（jQuery方式）
                    $boxElement.click(function () {
                        window.location.href = box.url; // 当前页面跳转
                    });

                    // 将盒子添加到容器中（jQuery方式）
                    $boxContainer.append($boxElement);
                });
            }

            // 执行渲染
            renderBoxes();
        });
    </script>
</body>

</html>
