<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>排队任务工具</title>
        <script src="../script/tailwindcss-3.4.17.min.js"></script>
        <script src="../script/jquery-4.0.0.min.js"></script>
        <link rel="stylesheet" href="../script/daisyui-full.min.css">
    </head>

    <body class="bg-gray-100 min-h-screen p-4 md:p-6">
        <div id="toast" class="toast"></div>

        <div class="max-w-5xl mx-auto">
            <h1 class="text-2xl md:text-3xl font-bold text-center mb-6">排队任务工具</h1>

            <!-- 操作栏 -->
            <div class="bg-white rounded-xl shadow p-4 mb-6 flex flex-wrap gap-3 items-center">
                <button id="exportJson" class="px-4 py-2 bg-blue-600 text-white rounded">导出 JSON</button>
                <label class="px-4 py-2 bg-gray-700 text-white rounded cursor-pointer">
                    导入 JSON
                    <input type="file" id="importJson" accept=".json" class="hidden">
                </label>
                <button id="addTask" class="px-4 py-2 bg-green-600 text-white rounded">新增任务</button>
                <button id="clearAll" class="px-4 py-2 bg-red-600 text-white rounded">清空所有</button>
                <div class="ml-auto text-sm space-x-4 font-medium">
                    <span>剩余总耗时：<b id="totalTime" class="text-red-600">0 分钟</b></span>
                    <span>预计完成：<b id="finishTime" class="text-blue-600">-</b></span>
                </div>
            </div>

            <!-- 队列列表 -->
            <div class="bg-white rounded-xl shadow p-4">
                <div class="grid grid-cols-12 gap-2 px-2 pb-2 border-b font-medium text-sm text-gray-600">
                    <div class="col-span-1">序号</div>
                    <div class="col-span-2">用户名</div>
                    <div class="col-span-3">任务名称</div>
                    <div class="col-span-2">耗时(分钟)</div>
                    <div class="col-span-2">任务状态</div>
                    <div class="col-span-2 text-right">操作</div>
                </div>
                <div id="taskQueue" class="space-y-2 mt-2"></div>
            </div>
        </div>

        <script>
            // 本地存储读取
            let taskList = JSON.parse(localStorage.getItem('taskQueueData')) || [
                { username: "张三", taskName: "日常代肝", minute: 30, status: "待处理" },
                { username: "李四", taskName: "副本通关", minute: 20, status: "进行中" },
                { username: "王五", taskName: "日常清体力", minute: 15, status: "已完成" },
                { username: "赵六", taskName: "活动任务", minute: 25, status: "已取消" }
            ];

            const statusList = ["待处理", "进行中", "已完成", "已取消"];

            // 淡色柔和主题
            function statusClass(status) {
                switch (status) {
                    case "待处理": return "bg-blue-100 text-blue-800";
                    case "进行中": return "bg-orange-100 text-orange-800 font-medium";
                    case "已完成": return "bg-green-100 text-green-800";
                    case "已取消": return "bg-gray-100 text-gray-500 opacity-70";
                    default: return "";
                }
            }

            // 排序：进行中 → 待处理 → 已完成 → 已取消
            function sortTasks() {
                taskList.sort((a, b) => {
                    const weight = { "进行中": 0, "待处理": 1, "已完成": 2, "已取消": 99 };
                    return (weight[a.status] || 99) - (weight[b.status] || 99);
                });
            }

            // 轻提示
            function showToast(msg) {
                const t = $("#toast");
                t.text(msg).addClass("show");
                setTimeout(() => t.removeClass("show"), 2000);
            }

            // 保存本地
            function save() {
                localStorage.setItem('taskQueueData', JSON.stringify(taskList));
            }

            // 渲染（修复卡顿：不强制刷新输入框焦点）
            function renderQueue() {
                sortTasks();
                const $list = $("#taskQueue");
                $list.empty();

                $.each(taskList, (i, item) => {
                    let opts = '';
                    $.each(statusList, (_, s) => {
                        opts += `<option value="${s}" ${s === item.status ? 'selected' : ''}>${s}</option>`;
                    });

                    const html = `
                    <div class="grid grid-cols-12 gap-2 items-center p-3 border rounded ${statusClass(item.status)}">
                        <div class="col-span-1 text-center">${i + 1}</div>
                        <input data-i="${i}" class="col-span-2 px-2 py-1 border rounded username" value="${item.username}">
                        <input data-i="${i}" class="col-span-3 px-2 py-1 border rounded taskname" value="${item.taskName}">
                        <input data-i="${i}" class="col-span-2 px-2 py-1 border text-right minute" value="${item.minute}" type="number" min="0">
                        <select data-i="${i}" class="col-span-2 px-2 py-1 border rounded status">${opts}</select>
                        <div class="col-span-2 text-right"><button data-i="${i}" class="del px-2 py-1 bg-red-500 text-white rounded text-sm">删除</button></div>
                    </div>`;
                    $list.append(html);
                });

                calcTotalTime();
                save();
            }

            // 计算耗时（排除已完成）
            function calcTotalTime() {
                const total = taskList.filter(t => t.status !== "已完成").reduce((s, t) => s + (Number(t.minute) || 0), 0);
                $("#totalTime").text(total + " 分钟");
                if (total <= 0) $("#finishTime").text("-");
                else {
                    const end = new Date(Date.now() + total * 60000);
                    $("#finishTime").text(end.toLocaleString());
                }
            }

            // 流畅输入（修复卡顿核心）
            $(document).on("input", ".username,.taskname,.minute", function () {
                const i = $(this).data("i");
                taskList[i].username = $(this).closest(".grid").find(".username").val();
                taskList[i].taskName = $(this).closest(".grid").find(".taskname").val();
                taskList[i].minute = Number($(this).closest(".grid").find(".minute").val()) || 0;
                calcTotalTime();
                save();
            });

            // 改状态
            $(document).on("change", ".status", function () {
                const i = $(this).data("i");
                taskList[i].status = $(this).val();
                renderQueue();
                showToast("状态已更新");
            });

            // 删除
            $(document).on("click", ".del", function () {
                taskList.splice($(this).data("i"), 1);
                renderQueue();
                showToast("已删除任务");
            });

            // 新增
            $("#addTask").click(() => {
                taskList.push({ username: "", taskName: "新任务", minute: 10, status: "待处理" });
                renderQueue();
                showToast("新增成功");
            });

            // 清空
            $("#clearAll").click(() => {
                if (confirm("确定清空所有任务？")) {
                    taskList = [];
                    renderQueue();
                    showToast("已清空所有任务");
                }
            });

            // 导出
            $("#exportJson").click(() => {
                const blob = new Blob([JSON.stringify(taskList, null, 2)], { type: "application/json" });
                const url = URL.createObjectURL(blob);
                $("<a>").attr({ href: url, download: "queue-data.json" })[0].click();
                URL.revokeObjectURL(url);
                showToast("导出成功");
            });

            // 导入
            $("#importJson").change(e => {
                const reader = new FileReader();
                reader.onload = ev => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (Array.isArray(data)) {
                            taskList = data;
                            renderQueue();
                            showToast("✅ 导入成功");
                        }
                    } catch {
                        showToast("❌ JSON 格式错误");
                    }
                };
                reader.readAsText(e.target.files[0]);
            });

            $(function () { renderQueue(); });
        </script>
    </body>

</html>
