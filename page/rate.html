<!DOCTYPE html>
<html lang="zh-CN">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>服务费倒扣计算器</title>
        <script src="script/tailwindcss-3.4.17.min.js"></script>
        <script src="script/jquery-4.0.0.min.js"></script>
        <link rel="stylesheet" href="script/daisyui-full.min.css">
        <style>
            .toast {
                @apply fixed top-4 left-1/2 -translate-x-1/2 px-6 py-3 rounded-lg bg-gray-800 text-white text-sm z-50 opacity-0 transition-opacity duration-300;
            }

            .toast.show {
                @apply opacity-100;
            }
        </style>
    </head>

    <body class="bg-gray-100 min-h-screen p-4 md:p-6">
        <div id="toast" class="toast"></div>
        <div class="max-w-5xl mx-auto">
            <h1 class="text-2xl md:text-3xl font-bold text-center mb-6">服务费倒扣计算器</h1>

            <div class="bg-white rounded-xl shadow p-5 mb-5">
                <div class="text-lg font-medium mb-3">客户最终支付金额（元）</div>
                <input id="finalAmount" type="number" placeholder="请输入客户最终支付金额" class="w-full px-4 py-2 border rounded" value="0">
            </div>

            <div class="bg-white rounded-xl shadow p-5 mb-5">
                <div class="flex justify-between items-center mb-3">
                    <div class="text-lg font-medium">服务费项</div>
                    <button id="addItem" class="px-4 py-2 bg-blue-600 text-white rounded">添加服务费</button>
                </div>
                <div id="feeList" class="space-y-3"></div>
            </div>

            <div class="bg-white rounded-xl shadow p-5">
                <div class="text-lg font-medium mb-3">计算结果</div>
                <div class="grid grid-cols-1 md:grid-cols-4 gap-4 text-sm">
                    <div class="p-3 bg-gray-50 rounded">客户支付：<b id="resFinal" class="font-bold">0.00</b></div>
                    <div class="p-3 bg-orange-50 rounded">总服务费：<b id="resFee" class="text-orange-600 font-bold">0.00</b></div>
                    <div class="p-3 bg-purple-50 rounded">实际综合费率：<b id="resTotalRate" class="text-purple-700 font-bold">0.00%</b></div>
                    <div class="p-3 bg-green-50 rounded">实际到手金额：<b id="resReal" class="text-green-700 text-xl font-bold">0.00</b></div>
                </div>
            </div>
        </div>

        <script>
            let finalAmount = localStorage.getItem('finalAmount') || "1.99";
            let feeItems = JSON.parse(localStorage.getItem('feeItems')) || [
                { name: "服务费", type: "rate", value: "0.6", min: "0.01", max: "0" }
            ];

            function showToast(msg) {
                const t = $("#toast"); t.text(msg).addClass("show");
                setTimeout(() => t.removeClass("show"), 2000);
            }

            function saveAll() {
                localStorage.setItem('finalAmount', finalAmount);
                localStorage.setItem('feeItems', JSON.stringify(feeItems));
            }

            function renderItems() {
                const $list = $("#feeList"); $list.empty();
                $.each(feeItems, (i, item) => {
                    const html = `
        <div class="flex items-center gap-2 flex-wrap p-3 border rounded bg-gray-50">
          <input data-i="${i}" class="name w-48 px-2 py-1 border rounded" placeholder="费用名称" value="${item.name}">
          <select data-i="${i}" class="type px-2 py-1 border rounded">
            <option value="rate" ${item.type === 'rate' ? 'selected' : ''}>费率(%)</option>
            <option value="fixed" ${item.type === 'fixed' ? 'selected' : ''}>固定金额</option>
          </select>
          <input data-i="${i}" class="value w-20 px-2 py-1 border rounded text-right" type="number" step="0.01" value="${item.value}" placeholder="费率/金额">
          <input data-i="${i}" class="fee-min w-20 px-2 py-1 border rounded text-right ${item.type === 'fixed' ? 'hidden' : 'inline'}" type="number" step="0.01" value="${item.min}" placeholder="最低">
          <input data-i="${i}" class="fee-max w-20 px-2 py-1 border rounded text-right ${item.type === 'fixed' ? 'hidden' : 'inline'}" type="number" step="0.01" value="${item.max}" placeholder="最高">
          <span class="flex-1 text-gray-500 text-sm calc-result-${i}"></span>
          <button data-i="${i}" class="del px-2 py-1 bg-red-500 text-white rounded text-sm">删除</button>
        </div>`;
                    $list.append(html);
                });
                calcAll();
            }

            $(document).on("change", ".type", function () {
                const i = $(this).data("i");
                const isRate = $(this).val() === "rate";
                feeItems[i].type = $(this).val();
                $(`.fee-min[data-i="${i}"], .fee-max[data-i="${i}"]`).toggleClass("hidden", !isRate);
                calcAll();
            });

            // ==============================================
            // 核心计算：100% 真实，不迭代、不修正、无精度问题
            // ==============================================
            function calcAll() {
                finalAmount = $("#finalAmount").val() || "0";
                const F = parseFloat(finalAmount) || 0;

                // 同步输入
                feeItems.forEach((it, i) => {
                    it.name = $(`.name[data-i="${i}"]`).val();
                    it.value = $(`.value[data-i="${i}"]`).val();
                    it.min = $(`.fee-min[data-i="${i}"]`).val();
                    it.max = $(`.fee-max[data-i="${i}"]`).val();
                });

                // 先算固定费
                let fixedTotal = 0;
                feeItems.forEach(it => {
                    if (it.type === "fixed") fixedTotal += parseFloat(it.value) || 0;
                });

                // 先扣固定费，得到可用于算费率的基数
                let real = F - fixedTotal;
                if (real < 0) real = 0;

                // 算每一笔费率费用（带上下限）
                let totalFee = fixedTotal;
                feeItems.forEach((it, i) => {
                    if (it.type !== "rate") return;
                    const v = parseFloat(it.value) || 0;
                    const min = parseFloat(it.min) || 0;
                    const max = parseFloat(it.max) || 0;

                    let fee = real * v / 100;
                    if (max > 0) fee = Math.min(fee, max);
                    fee = Math.max(fee, min);

                    totalFee += fee;
                    $(`.calc-result-${i}`).text(`≈ ${fee.toFixed(2)}`);
                });

                // 最终真实到手
                real = F - totalFee;
                if (real < 0) real = 0;

                // 实际综合费率：完全按结果算，可大可小
                const realRate = F > 0 ? (totalFee / F) * 100 : 0;

                // 展示
                $("#resFinal").text(F.toFixed(2));
                $("#resFee").text(totalFee.toFixed(2));
                $("#resTotalRate").text(realRate.toFixed(2) + "%");
                $("#resReal").text(real.toFixed(2));

                saveAll();
            }

            $("#finalAmount").on("input", calcAll);
            $(document).on("input", ".name,.value,.fee-min,.fee-max", calcAll);

            $(document).on("click", ".del", function () {
                feeItems.splice($(this).data("i"), 1);
                renderItems();
            });

            $("#addItem").click(() => {
                feeItems.push({ name: "新费用", type: "rate", value: 0, min: 0, max: 0 });
                renderItems();
                showToast("已添加");
            });

            $(function () {
                $("#finalAmount").val(finalAmount);
                renderItems();
            });
        </script>
    </body>

</html>
