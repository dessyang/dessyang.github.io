<div class="max-w-7xl mx-auto py-8 px-4">
    <header class="text-center mb-12">
        <h1 class="text-[clamp(2rem,5vw,3.5rem)] font-bold text-base-content mb-3">我的导航中心</h1>
        <p class="text-base-content/70 text-lg">简单实用的小工具集合</p>
    </header>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
        <a v-for="(item, index) in navData" :key="index" :href="item.url" class="block group">
            <div :class="item.color" class="rounded-2xl shadow-lg p-8 h-full
                transition-all duration-300 hover:scale-105 hover:shadow-xl active:scale-98">
                <div class="flex items-center gap-4 mb-5">
                    <img v-if="item.icon" :src="item.icon" :alt="item.title" class="w-14 h-14 object-contain bg-white/20 rounded-xl p-2 shadow-sm" />
                    <h2 class="text-xl font-bold text-white">{{ item.title }}</h2>
                </div>
                <p class="text-white/90 text-base leading-relaxed">{{ item.desc }}</p>
            </div>
        </a>
    </div>
</div>
